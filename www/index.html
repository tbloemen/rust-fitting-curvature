<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Curvature Embedding — Rust/WASM</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="sidebar" id="sidebar">
      <div class="sidebar-content">
        <h1>Constant Curvature Embedding</h1>
        <a href="landscape.html" style="display:inline-block;margin-bottom:12px;font-size:0.75rem;color:#5dade2;text-decoration:none;">GP Landscape →</a>

        <div class="section">
          <div class="section-title">Data Source</div>
          <div class="toggle-group">
            <button id="btn-mnist" class="active">MNIST</button>
            <button id="btn-synthetic">Synthetic</button>
          </div>

          <div id="synthetic-controls" style="display: none">
            <div class="control-group">
              <label for="dataset">Dataset</label>
              <select id="dataset">
                <option value="uniform_grid">Uniform Grid (Eucl.)</option>
                <option value="gaussian_blob">Gaussian Blob (Eucl.)</option>
                <option value="concentric_circles">
                  Concentric Circles (Eucl.)
                </option>
                <option value="uniform_sphere">Uniform Sphere</option>
                <option value="von_mises_fisher">Von Mises-Fisher</option>
                <option value="antipodal_clusters">Antipodal Clusters</option>
                <option value="uniform_hyperbolic" selected>
                  Uniform Hyperbolic
                </option>
                <option value="tree_structured">Tree Structured</option>
                <option value="hyperbolic_shells">Hyperbolic Shells</option>
              </select>
            </div>
            <div class="control-group">
              <label for="synth_n_points">Points</label>
              <input
                type="number"
                id="synth_n_points"
                value="300"
                min="10"
                max="5000"
              />
            </div>
          </div>

          <div id="mnist-controls">
            <div class="control-group">
              <label for="mnist_n_points">Points (max 10000)</label>
              <input
                type="number"
                id="mnist_n_points"
                value="1000"
                min="100"
                max="10000"
              />
            </div>
            <p style="font-size: 0.65rem; color: #666; margin-top: 4px">
              Downloads from remote if local data is unavailable
            </p>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Embedding Parameters</div>
          <div class="control-group">
            <label for="curvature">Curvature</label>
            <input type="text" id="curvature" inputmode="numeric" />
          </div>
          <div class="control-group">
            <label for="perplexity">Perplexity</label>
            <input type="number" id="perplexity" min="5" max="100" />
          </div>
          <div class="control-group">
            <label for="iterations">Iterations</label>
            <input type="number" id="iterations" min="10" max="5000" />
          </div>
          <div class="control-group">
            <label for="lr">Learning Rate</label>
            <input type="number" id="lr" step="10" />
          </div>
        </div>

        <div class="section">
          <div class="section-title">Early Exaggeration</div>
          <div class="control-group">
            <label for="ee_factor">Exaggeration Factor</label>
            <input type="number" id="ee_factor" step="0.5" min="1" />
          </div>
          <div class="control-group">
            <label for="ee_iterations">Exaggeration Iterations</label>
            <input type="number" id="ee_iterations" min="0" max="5000" />
          </div>
        </div>

        <div class="section">
          <div class="section-title">Global Constraints</div>
          <div class="loss-grid">
            <span class="loss-col-header"></span>
            <span class="loss-col-header">Type</span>
            <span class="loss-col-header">λ</span>

            <span class="loss-col-name">Scale</span>
            <select id="scaling_loss">
              <option value="none">None</option>
              <option value="hard_barrier">Hard Barrier</option>
              <option value="softplus_barrier">Softplus</option>
              <option value="rms">RMS</option>
              <option value="mean_distance">Mean Dist.</option>
            </select>
            <input type="number" id="centering_weight" step="0.1" min="0" />

            <span class="loss-col-name">Global</span>
            <span></span>
            <input type="number" id="global_loss_weight" step="1" min="0" />

            <span class="loss-col-name">Norm</span>
            <span></span>
            <input
              type="number"
              id="norm_loss_weight"
              step="0.001"
              min="0"
              value="0"
            />
          </div>
        </div>

        <div class="section">
          <div class="section-title">Projection</div>
          <div class="control-group">
            <label for="projection">Spherical projection</label>
            <select id="projection">
              <option value="azimuthal_equidistant">
                Azimuthal Equidistant
              </option>
              <option value="stereographic" selected>Stereographic</option>
              <option value="orthographic">Orthographic</option>
            </select>
          </div>
        </div>

        <div class="button-group">
          <button id="run-btn" class="primary">Run</button>
          <button id="stop-btn" class="primary" disabled>Stop</button>
          <button id="step-btn" class="primary">Step</button>
        </div>
      </div>
    </div>

    <div class="main">
      <button class="sidebar-toggle shifted" id="sidebar-toggle">
        &#9776;
      </button>
      <div class="canvas-wrapper" id="canvas-wrapper">
        <div class="plot-title" id="plot-title"></div>
        <canvas id="canvas" width="500" height="500"></canvas>
        <div class="zoom-indicator" id="zoom-indicator"></div>
        <div class="metrics-panel" id="metrics-panel" style="display: none">
          <div class="section-title">Quality Metrics</div>
          <div id="metrics-content"></div>
        </div>
      </div>
      <div class="status-bar">
        <p id="status">Loading WASM module...</p>
        <div
          class="progress-container"
          id="progress-container"
          style="display: none"
        >
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <p class="loss-display" id="loss-display"></p>
        <p class="loss-display" id="fps-display"></p>
        <p class="canvas-hint">
          scroll to zoom · drag to pan · double-click to reset
        </p>
      </div>
    </div>

    <script src="./index.js" type="module"></script>
  </body>
</html>
